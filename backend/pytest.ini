[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
norecursedirs = scripts app/ai_lab .git .venv venv __pycache__ *.egg-info .pytest_cache node_modules

# Async support
asyncio_mode = strict

# Coverage settings
[coverage:run]
source = app
omit = 
    */tests/*
    */migrations/*
    */venv/*
    */__pycache__/*
    */conftest.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
fail_under = 70

# Test markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (database, external APIs)
    e2e: End-to-end tests (full workflow)
    performance: Performance and load tests
    slow: Slow running tests
    external: Tests that call external APIs
    requires_db: Tests that require database connection
    requires_auth: Tests that require authentication

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml

# Warnings – demp Pydantic deprecations og pytest marks
# Merk: For helt uten advarsler, kjør: PYTHONWARNINGS=ignore pytest ... eller make test
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnknownMarkWarning
    ignore::pydantic.PydanticDeprecatedSince20
    ignore::pydantic.PydanticDeprecatedSince211

# Logging
log_cli = false
log_cli_level = INFO
log_file = tests/test.log
log_file_level = DEBUG
