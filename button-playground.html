<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knapp-playground</title>
<style id="dyn-hover"></style>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8fafc;--surface:#ffffff;--surface2:#f1f5f9;--border:#e2e8f0;
  --text:#0f172a;--muted:#64748b;--accent:#58a6ff;
  --font:'Helvetica Neue',Helvetica,Arial,sans-serif;
  --mono:'SF Mono','Fira Code',Consolas,monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
#header{background:var(--surface);border-bottom:1px solid var(--border);padding:9px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#header h1{font-size:13px;font-weight:600}
.preset-chip{background:var(--surface2);border:1px solid var(--border);border-radius:45px;padding:3px 11px;font-size:11px;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.preset-chip:hover,.preset-chip.active{border-color:var(--accent);color:var(--accent)}

/* MAIN */
#main{display:flex;flex:1;overflow:hidden}

/* CONTROLS */
#controls{width:260px;min-width:260px;border-right:1px solid var(--border);overflow-y:auto;padding:14px;background:var(--surface);display:flex;flex-direction:column;gap:16px}
.ctrl-group{display:flex;flex-direction:column;gap:8px}
.ctrl-group-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding-bottom:2px;border-bottom:1px solid var(--border)}
.ctrl-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.ctrl-row label{font-size:12px;color:var(--text);flex-shrink:0}
.ctrl-right{display:flex;align-items:center;gap:6px;flex:1;justify-content:flex-end}
/* Slider */
input[type=range]{flex:1;accent-color:var(--accent);cursor:pointer;min-width:0}
.val-badge{font-family:var(--mono);font-size:11px;color:var(--accent);min-width:36px;text-align:right}
/* Color picker */
input[type=color]{width:32px;height:24px;border:1px solid var(--border);border-radius:12px;cursor:pointer;padding:1px;background:none}
/* Select */
select{background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:11px;padding:3px 6px;outline:none;cursor:pointer}
select:focus{border-color:var(--accent)}
/* Toggle */
.toggle-wrap{display:flex;align-items:center;gap:6px;cursor:pointer}
.toggle{position:relative;width:34px;height:18px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-track{position:absolute;inset:0;background:var(--surface2);border:1px solid var(--border);border-radius:9px;transition:.2s}
.toggle input:checked + .toggle-track{background:var(--accent);border-color:var(--accent)}
.toggle-thumb{position:absolute;top:2px;left:2px;width:12px;height:12px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked ~ .toggle-thumb{left:18px}
/* Text input */
input[type=text]{background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:12px;padding:4px 8px;outline:none;width:100%}
input[type=text]:focus{border-color:var(--accent)}

/* PREVIEW */
#preview-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
#preview-toolbar{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
#preview-toolbar span{font-size:11px;color:var(--muted)}
.bg-opt{padding:2px 10px;border-radius:12px;font-size:11px;border:1px solid var(--border);cursor:pointer;color:var(--muted);transition:all .15s}
.bg-opt:hover{border-color:var(--accent);color:var(--accent)}
.bg-opt.active{border-color:var(--accent);color:var(--accent);background:rgba(88,166,255,.1)}
#preview-stage{flex:1;display:flex;align-items:center;justify-content:center;transition:background .3s;position:relative;overflow:hidden}
#preview-stage.light{background:#f3f4f6}
#preview-stage.dark{background:#111827}
#preview-stage.white{background:#ffffff}

/* The actual button being previewed */
#preview-btn{
  cursor:pointer;
  font-family:inherit;
  letter-spacing:.01em;
  white-space:nowrap;
  display:inline-block;
}

/* FOOTER */
#footer{border-top:1px solid var(--border);background:var(--surface);padding:10px 14px;flex-shrink:0;display:flex;gap:10px;align-items:flex-end}
#prompt-wrap{flex:1}
#prompt-label{font-size:10px;font-weight:600;text-transform:uppercase;color:var(--muted);margin-bottom:4px;letter-spacing:.5px}
#prompt-out{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:7px 11px;font-size:12px;color:var(--text);font-family:var(--mono);min-height:46px;max-height:70px;overflow-y:auto;resize:none}
#copy-btn{background:var(--accent);border:none;border-radius:14px;color:#fff;font-size:12px;font-weight:500;padding:7px 14px;cursor:pointer;white-space:nowrap}
#copy-btn:hover{opacity:.85}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div id="header">
  <h1>🎨 Knapp-playground</h1>
  <div id="presets" style="display:flex;gap:6px;flex-wrap:wrap"></div>
</div>

<div id="main">
  <aside id="controls">

    <div class="ctrl-group">
      <div class="ctrl-group-label">Knapptekst</div>
      <input type="text" id="btn-label" value="Kom i gang">
    </div>

    <div class="ctrl-group">
      <div class="ctrl-group-label">Farge</div>
      <div class="ctrl-row">
        <label>Bakgrunn</label>
        <div class="ctrl-right">
          <input type="color" id="c-bg" value="#2563eb">
          <span class="val-badge" id="v-bg">#2563eb</span>
        </div>
      </div>
      <div class="ctrl-row">
        <label>Tekst</label>
        <div class="ctrl-right">
          <input type="color" id="c-text" value="#ffffff">
          <span class="val-badge" id="v-text">#ffffff</span>
        </div>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="ctrl-group-label">Form</div>
      <div class="ctrl-row">
        <label>Hjørneradius</label>
        <div class="ctrl-right">
          <input type="range" id="s-radius" min="0" max="100" value="8">
          <span class="val-badge" id="v-radius">8px</span>
        </div>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="ctrl-group-label">Padding</div>
      <div class="ctrl-row">
        <label>Horisontal</label>
        <div class="ctrl-right">
          <input type="range" id="s-padh" min="8" max="56" value="24">
          <span class="val-badge" id="v-padh">24px</span>
        </div>
      </div>
      <div class="ctrl-row">
        <label>Vertikal</label>
        <div class="ctrl-right">
          <input type="range" id="s-padv" min="4" max="28" value="12">
          <span class="val-badge" id="v-padv">12px</span>
        </div>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="ctrl-group-label">Typografi</div>
      <div class="ctrl-row">
        <label>Størrelse</label>
        <div class="ctrl-right">
          <input type="range" id="s-size" min="11" max="22" value="15">
          <span class="val-badge" id="v-size">15px</span>
        </div>
      </div>
      <div class="ctrl-row">
        <label>Tykkelse</label>
        <div class="ctrl-right">
          <select id="sel-weight">
            <option value="400">400 Normal</option>
            <option value="500">500 Medium</option>
            <option value="600" selected>600 Semibold</option>
            <option value="700">700 Bold</option>
          </select>
        </div>
      </div>
      <div class="ctrl-row">
        <label>Store bokstaver</label>
        <div class="ctrl-right">
          <label class="toggle-wrap">
            <label class="toggle">
              <input type="checkbox" id="t-upper">
              <div class="toggle-track"></div>
              <div class="toggle-thumb"></div>
            </label>
          </label>
        </div>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="ctrl-group-label">Effekter</div>
      <div class="ctrl-row">
        <label>Skygge</label>
        <div class="ctrl-right">
          <label class="toggle-wrap">
            <label class="toggle">
              <input type="checkbox" id="t-shadow" checked>
              <div class="toggle-track"></div>
              <div class="toggle-thumb"></div>
            </label>
          </label>
        </div>
      </div>
      <div class="ctrl-row">
        <label>Ramme (border)</label>
        <div class="ctrl-right">
          <label class="toggle-wrap">
            <label class="toggle">
              <input type="checkbox" id="t-border">
              <div class="toggle-track"></div>
              <div class="toggle-thumb"></div>
            </label>
          </label>
        </div>
      </div>
      <div class="ctrl-row">
        <label>Hover-løft</label>
        <div class="ctrl-right">
          <label class="toggle-wrap">
            <label class="toggle">
              <input type="checkbox" id="t-lift" checked>
              <div class="toggle-track"></div>
              <div class="toggle-thumb"></div>
            </label>
          </label>
        </div>
      </div>
    </div>

  </aside>

  <section id="preview-area">
    <div id="preview-toolbar">
      <span>Bakgrunn:</span>
      <div class="bg-opt active" data-bg="light">Lys</div>
      <div class="bg-opt" data-bg="dark">Mørk</div>
      <div class="bg-opt" data-bg="white">Hvit</div>
    </div>
    <div id="preview-stage" class="light">
      <button id="preview-btn">Kom i gang</button>
    </div>
  </section>
</div>

<div id="footer">
  <div id="prompt-wrap">
    <div id="prompt-label">Prompt-output</div>
    <textarea id="prompt-out" readonly></textarea>
  </div>
  <button id="copy-btn">Kopier</button>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────
var DEFAULTS = {
  bg:'#2563eb', textCol:'#ffffff',
  radius:8, padH:24, padV:12,
  size:15, weight:'600', upper:false,
  shadow:true, border:false, lift:true,
  label:'Kom i gang',
};

var S = {};
Object.keys(DEFAULTS).forEach(function(k){ S[k] = DEFAULTS[k]; });

var PRESETS = [
  { name:'Standard blå',    bg:'#2563eb',textCol:'#ffffff',radius:8, padH:24,padV:12,size:15,weight:'600',upper:false,shadow:true, border:false,lift:true  },
  { name:'Grønn pille',     bg:'#16a34a',textCol:'#ffffff',radius:100,padH:32,padV:13,size:14,weight:'600',upper:false,shadow:false,border:false,lift:true  },
  { name:'Ghost',           bg:'#ffffff',textCol:'#2563eb',radius:8, padH:24,padV:11,size:15,weight:'600',upper:false,shadow:false,border:true, lift:false },
  { name:'Mørk & skarp',   bg:'#111827',textCol:'#f9fafb',radius:4, padH:22,padV:11,size:14,weight:'700',upper:true, shadow:false,border:false,lift:false },
  { name:'Varm CTA',        bg:'#ea580c',textCol:'#ffffff',radius:12,padH:28,padV:14,size:16,weight:'700',upper:false,shadow:true, border:false,lift:true  },
];

// ── HELPERS ────────────────────────────────────────────────
function hexToRgba(hex, a) {
  var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}

// ── RENDER ─────────────────────────────────────────────────
function renderPreview() {
  var btn = document.getElementById('preview-btn');
  btn.textContent = S.label || 'Knapp';
  btn.style.backgroundColor = S.bg;
  btn.style.color = S.textCol;
  btn.style.borderRadius = S.radius + 'px';
  btn.style.paddingLeft = S.padH + 'px';
  btn.style.paddingRight = S.padH + 'px';
  btn.style.paddingTop = S.padV + 'px';
  btn.style.paddingBottom = S.padV + 'px';
  btn.style.fontSize = S.size + 'px';
  btn.style.fontWeight = S.weight;
  btn.style.textTransform = S.upper ? 'uppercase' : 'none';
  btn.style.letterSpacing = S.upper ? '.06em' : 'normal';
  btn.style.border = S.border ? '2px solid ' + S.textCol : '2px solid transparent';
  btn.style.boxShadow = S.shadow ? '0 4px 16px ' + hexToRgba(S.bg, 0.45) : 'none';

  // Hover style via style element textContent (safe — sets CSS text, not HTML)
  var hoverShadow = S.shadow ? '0 6px 22px ' + hexToRgba(S.bg, 0.6) : 'none';
  var hoverTransform = S.lift ? 'translateY(-2px)' : 'none';
  document.getElementById('dyn-hover').textContent =
    '#preview-btn { transition: transform .18s ease, box-shadow .18s ease, filter .18s ease; }' +
    '#preview-btn:hover { filter: brightness(1.08); transform: ' + hoverTransform + '; box-shadow: ' + hoverShadow + '; }' +
    '#preview-btn:active { filter: brightness(0.95); transform: none; box-shadow: none; }';
}

function updatePrompt() {
  var parts = [];

  // Background color
  parts.push('bakgrunnsfarge ' + S.bg);

  // Text color (only if not default white)
  if (S.textCol.toLowerCase() !== '#ffffff') {
    parts.push('tekstfarge ' + S.textCol);
  }

  // Border-radius
  if (S.radius >= 100) {
    parts.push('pille-form (border-radius 9999px)');
  } else if (S.radius === 0) {
    parts.push('skarpe hjørner (border-radius 0)');
  } else {
    parts.push('border-radius ' + S.radius + 'px');
  }

  // Padding (only if non-default)
  if (S.padH !== DEFAULTS.padH || S.padV !== DEFAULTS.padV) {
    parts.push('padding ' + S.padV + 'px ' + S.padH + 'px');
  }

  // Font
  if (S.size !== DEFAULTS.size) {
    parts.push('skriftstørrelse ' + S.size + 'px');
  }
  if (S.weight !== DEFAULTS.weight) {
    parts.push('font-weight ' + S.weight);
  }
  if (S.upper) {
    parts.push('tekst i store bokstaver');
  }

  // Effects
  var effects = [];
  if (!S.shadow) effects.push('ingen skygge');
  else if (S.shadow) effects.push('fargeskygge');
  if (S.border) effects.push('synlig ramme');
  if (!S.lift) effects.push('ingen hover-løft');
  if (effects.length) parts.push(effects.join(', '));

  var ta = document.getElementById('prompt-out');
  ta.value = 'Gi knappen med teksten "' + (S.label||'Knapp') + '" følgende stil: ' + parts.join(', ') + '.';
}

function renderAll() {
  renderPreview();
  updatePrompt();
}

// ── INIT CONTROLS ──────────────────────────────────────────
(function init() {
  // Presets
  var presetsEl = document.getElementById('presets');
  PRESETS.forEach(function(p) {
    var chip = document.createElement('button');
    chip.className = 'preset-chip';
    chip.textContent = p.name;
    chip.addEventListener('click', function() {
      Object.keys(p).forEach(function(k){ if(k!=='name') S[k]=p[k]; });
      syncControls();
      renderAll();
      document.querySelectorAll('.preset-chip').forEach(function(c){ c.classList.remove('active'); });
      chip.classList.add('active');
    });
    presetsEl.appendChild(chip);
  });

  // Color pickers
  document.getElementById('c-bg').addEventListener('input', function() {
    S.bg = this.value;
    document.getElementById('v-bg').textContent = this.value;
    renderAll();
  });
  document.getElementById('c-text').addEventListener('input', function() {
    S.textCol = this.value;
    document.getElementById('v-text').textContent = this.value;
    renderAll();
  });

  // Sliders
  function bindSlider(id, key, badge, suffix) {
    document.getElementById(id).addEventListener('input', function() {
      S[key] = parseInt(this.value, 10);
      document.getElementById(badge).textContent = this.value + suffix;
      renderAll();
    });
  }
  bindSlider('s-radius','radius','v-radius','px');
  bindSlider('s-padh','padH','v-padh','px');
  bindSlider('s-padv','padV','v-padv','px');
  bindSlider('s-size','size','v-size','px');

  // Select
  document.getElementById('sel-weight').addEventListener('change', function() {
    S.weight = this.value; renderAll();
  });

  // Toggles
  function bindToggle(id, key) {
    document.getElementById(id).addEventListener('change', function() {
      S[key] = this.checked; renderAll();
    });
  }
  bindToggle('t-upper','upper');
  bindToggle('t-shadow','shadow');
  bindToggle('t-border','border');
  bindToggle('t-lift','lift');

  // Label input
  document.getElementById('btn-label').addEventListener('input', function() {
    S.label = this.value; renderAll();
  });

  // Background toggle
  document.querySelectorAll('.bg-opt').forEach(function(opt) {
    opt.addEventListener('click', function() {
      document.querySelectorAll('.bg-opt').forEach(function(o){ o.classList.remove('active'); });
      opt.classList.add('active');
      var stage = document.getElementById('preview-stage');
      stage.className = 'light'; // reset
      if (opt.dataset.bg === 'dark') stage.className = 'dark';
      else if (opt.dataset.bg === 'white') stage.className = 'white';
    });
  });

  // Copy button
  document.getElementById('copy-btn').addEventListener('click', function() {
    var ta = document.getElementById('prompt-out');
    navigator.clipboard.writeText(ta.value).then(function() {
      document.getElementById('copy-btn').textContent = 'Kopiert!';
      setTimeout(function(){ document.getElementById('copy-btn').textContent = 'Kopier'; }, 1500);
    });
  });

  syncControls();
  renderAll();
})();

function syncControls() {
  document.getElementById('c-bg').value = S.bg;
  document.getElementById('v-bg').textContent = S.bg;
  document.getElementById('c-text').value = S.textCol;
  document.getElementById('v-text').textContent = S.textCol;
  document.getElementById('s-radius').value = S.radius;
  document.getElementById('v-radius').textContent = S.radius + 'px';
  document.getElementById('s-padh').value = S.padH;
  document.getElementById('v-padh').textContent = S.padH + 'px';
  document.getElementById('s-padv').value = S.padV;
  document.getElementById('v-padv').textContent = S.padV + 'px';
  document.getElementById('s-size').value = S.size;
  document.getElementById('v-size').textContent = S.size + 'px';
  document.getElementById('sel-weight').value = S.weight;
  document.getElementById('t-upper').checked = S.upper;
  document.getElementById('t-shadow').checked = S.shadow;
  document.getElementById('t-border').checked = S.border;
  document.getElementById('t-lift').checked = S.lift;
  document.getElementById('btn-label').value = S.label;
}
</script>
</body>
</html>
