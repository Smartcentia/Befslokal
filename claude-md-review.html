// ── DOM creation helper (no innerHTML anywhere) ──────────────────
function mkNode(tag, className, textContent) {
  const n = document.createElement(tag);
  if (className) n.className = className;
  if (textContent !== undefined) n.textContent = textContent;
  return n;
}

// ── Inline markdown \u2014 uses split(), not regex exec ───────────────
function parseInline(text, container) {
  // Split on **bold**, *em*, `code` delimiters using capturing groups
  const parts = text.split(/(\*\*[^*]+\*\*|\*[^*]+\*|`[^`]+`)/);
  parts.forEach(function(part) {
    if (!part) return;
    if (part.length > 4 && part.slice(0,2) === '**' && part.slice(-2) === '**') {
      const b = mkNode('strong', 'mk-bold', part.slice(2,-2));
      container.appendChild(b);
    } else if (part.length > 2 && part[0] === '*' && part[part.length-1] === '*' && part[1] !== '*') {
      const e = mkNode('em', 'mk-em', part.slice(1,-1));
      container.appendChild(e);
    } else if (part.length > 2 && part[0] === '`' && part[part.length-1] === '`') {
      const c = mkNode('code', 'mk-code', part.slice(1,-1));
      container.appendChild(c);
    } else {
      container.appendChild(document.createTextNode(part));
    }
  });
}

function makeLineBody(raw, isCodeLine) {
  const body = mkNode('div', 'line-body');

  if (isCodeLine) {
    body.appendChild(mkNode('span', 'md-code-line', raw));
    return body;
  }
  if (raw.slice(0,3) === '```') {
    body.appendChild(mkNode('span', 'md-code-fence', raw));
    return body;
  }
  if (raw.slice(0,2) === '# ') {
    body.appendChild(mkNode('span', 'md-h1', raw.slice(2)));
    return body;
  }
  if (raw.slice(0,3) === '## ') {
    body.appendChild(mkNode('span', 'md-h2', raw.slice(3)));
    return body;
  }
  if (raw.slice(0,4) === '### ') {
    body.appendChild(mkNode('span', 'md-h3', raw.slice(4)));
    return body;
  }
  if (raw.slice(0,2) === '> ') {
    const bq = mkNode('span', 'md-blockquote');
    parseInline(raw.slice(2), bq);
    body.appendChild(bq);
    return body;
  }
  if (raw[0] === '|') {
    body.appendChild(mkNode('span', 'md-table', raw));
    return body;
  }
  if (!raw.trim()) {
    body.appendChild(mkNode('span', 'md-blank'));
    return body;
  }
  // Normal paragraph with inline formatting
  const s = mkNode('span', 'md-text');
  parseInline(raw, s);
  body.appendChild(s);
  return body;
}

// ── Suggestion for line ──────────────────────────────────────────
function sugForLine(ln) {
  for (var i = 0; i < SUGS.length; i++) {
    if (SUGS[i].lines.indexOf(ln) !== -1) return SUGS[i];
  }
  return null;
}

// ── Render document ───────────────────────────────────────────────
function renderDoc() {
  var panel = document.getElementById('doc-panel');
  while (panel.firstChild) panel.removeChild(panel.firstChild);

  var inCode = false;
  for (var i = 0; i < DOC.length; i++) {
    var raw = DOC[i];
    var ln = i + 1;
    if (raw.slice(0,3) === '```') inCode = !inCode;

    var sug = sugForLine(ln);
    var row = mkNode('div', 'doc-line');
    if (sug) {
      row.classList.add('has-sug');
      if (sug.status === 'approved') row.classList.add('approved');
      if (sug.status === 'rejected') row.classList.add('rejected');
      row.dataset.sid = sug.id;
    }

    row.appendChild(mkNode('span', 'line-num', ln));
    row.appendChild(makeLineBody(raw, inCode && raw.slice(0,3) !== '```'));

    if (sug) {
      var pip = mkNode('span', 'sug-pip pip-' + sug.status,
        sug.status === 'approved' ? '\u2713' : sug.status === 'rejected' ? '\u2717' : '\u25cf');
      pip.title = 'S' + sug.id + ': ' + sug.text.slice(0, 60) + '\u2026';
      (function(sid) {
        pip.addEventListener('click', function(ev) {
          ev.stopPropagation();
          scrollToCard(sid);
        });
      })(sug.id);
      row.appendChild(pip);
    }
    panel.appendChild(row);
  }
}

  var list = document.getElementById('sug-list');
  while (list.firstChild) list.removeChild(list.firstChild);

  var filtered = SUGS.filter(function(s) {
    return appState.filter === 'all' || s.status === appState.filter;
  });

  if (!filtered.length) {
    list.appendChild(mkNode('p', null, 'No suggestions in this filter.'));
    list.firstChild.style.cssText = 'font-size:12px;color:#64748b;font-style:italic;padding:12px;';
    return;
  }

  filtered.forEach(function(sug) {
    var cls = 'sug-card' + (sug.status !== 'pending' ? ' '+sug.status : '') + (appState.activeId === sug.id ? ' is-active' : '');
    var card = mkNode('div', cls);
    card.dataset.id = sug.id;

    // Head
    var head = mkNode('div', 'card-head');
    var endLine = sug.lines[sug.lines.length-1];
    var lineLabel = sug.lines.length > 1 ? 'Lines ' + sug.lines[0] + '\u2013' + endLine : 'Line ' + sug.lines[0];
    head.appendChild(mkNode('span', 'card-lineref', lineLabel));
    head.appendChild(mkNode('span', 'card-cat cat-'+sug.cat, CAT_LABELS[sug.cat] || sug.cat));
    card.appendChild(head);

    // Body
    var body = mkNode('div', 'card-body');
    body.appendChild(mkNode('p', 'card-sug-text', sug.text));
    var origTxt = sug.orig.length > 80 ? sug.orig.slice(0,78) + '\u2026' : sug.orig;
    body.appendChild(mkNode('div', 'card-orig', origTxt));

    // Actions
    var acts = mkNode('div', 'card-actions');
    if (sug.status !== 'pending') {
      var rst = mkNode('button', 'abtn abtn-reset', '\u21a9 Reset');
      (function(sid) {
        rst.addEventListener('click', function(e) { e.stopPropagation(); setStat(sid,'pending'); });
      })(sug.id);
      acts.appendChild(rst);
    } else {
      var apr = mkNode('button', 'abtn abtn-approve', '\u2713 Approve');
      var rej = mkNode('button', 'abtn abtn-reject',  '\u2717 Reject');
      (function(sid) {
        apr.addEventListener('click', function(e) { e.stopPropagation(); setStat(sid,'approved'); });
        rej.addEventListener('click', function(e) { e.stopPropagation(); setStat(sid,'rejected'); });
      })(sug.id);
      acts.appendChild(apr);
      acts.appendChild(rej);
    }
    var noteBtn = mkNode('button', 'abtn abtn-note', sug.userComment ? '\ud83d\udcac Edit note' : '\ud83d\udcac Note');
    (function(sid) {
      noteBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        var s = SUGS.find(function(x){ return x.id === sid; });
        s.showNote = !s.showNote;
        renderSugs();
      });
    })(sug.id);
    acts.appendChild(noteBtn);
    body.appendChild(acts);

    // Note textarea
    if (sug.showNote) {
      var na = mkNode('div', 'note-area');
      var ta = mkNode('textarea');
      ta.placeholder = 'Your note\u2026';
      ta.value = sug.userComment;
      var sv = mkNode('button', 'note-save', 'Save');
      (function(sid, taRef) {
        sv.addEventListener('click', function() {
          var s = SUGS.find(function(x){ return x.id === sid; });
          s.userComment = taRef.value.trim();
          s.showNote = false;
          updateAll();
        });
      })(sug.id, ta);
      na.appendChild(ta); na.appendChild(sv);
      body.appendChild(na);
    } else if (sug.userComment) {
      body.appendChild(mkNode('div', 'saved-note', 'Note: ' + sug.userComment));
    }

    card.appendChild(body);

    (function(sid, firstLine) {
      card.addEventListener('click', function() {
        appState.activeId = appState.activeId === sid ? null : sid;
        scrollDocLine(firstLine);
        updateAll();
      });
    })(sug.id, sug.lines[0]);

    list.appendChild(card);
  });
}

function setStat(id, status) {
  var s = SUGS.find(function(x){ return x.id === id; });
  if (s) { s.status = status; updateAll(); }
}
function scrollToCard(id) {
  appState.activeId = id;
  updateAll();
  var card = document.querySelector('.sug-card[data-id="' + id + '"]');
  if (card) card.scrollIntoView({ behavior:'smooth', block:'nearest' });
}
function scrollDocLine(ln) {
  var rows = document.querySelectorAll('.doc-line');
  var row = rows[ln - 1];
  if (row) row.scrollIntoView({ behavior:'smooth', block:'center' });
}

// ── Counts ───────────────────────────────────────────────────────
function updateCounts() {
  var p = SUGS.filter(function(s){ return s.status === 'pending'; }).length;
  var a = SUGS.filter(function(s){ return s.status === 'approved'; }).length;
  var r = SUGS.filter(function(s){ return s.status === 'rejected'; }).length;
  document.getElementById('s-pending').textContent  = p;
  document.getElementById('s-approved').textContent = a;
  document.getElementById('s-rejected').textContent = r;
  document.getElementById('tc-all').textContent      = SUGS.length;
  document.getElementById('tc-pending').textContent  = p;
  document.getElementById('tc-approved').textContent = a;
  document.getElementById('tc-rejected').textContent = r;
}

// ── Prompt ───────────────────────────────────────────────────────
function updatePrompt() {
  var out = document.getElementById('prompt-out');
  while (out.firstChild) out.removeChild(out.firstChild);

  var approved = SUGS.filter(function(s){ return s.status === 'approved'; });
  var noted    = SUGS.filter(function(s){ return s.userComment && s.status !== 'approved'; });
  var rejected = SUGS.filter(function(s){ return s.status === 'rejected'; });

  if (!approved.length && !noted.length) {
    out.appendChild(mkNode('span', 'ph', 'Approve suggestions to build a prompt for Claude\u2026'));
    return;
  }

  var txt = 'Please update CLAUDE.md (BEFS_CLEAN project) with the following:\n\n';
  if (approved.length) {
    txt += '## Approved Changes\n\n';
    approved.forEach(function(s) {
      var endLine = s.lines[s.lines.length-1];
      var ref = s.lines.length > 1 ? 'Lines ' + s.lines[0] + '\u2013' + endLine : 'Line ' + s.lines[0];
      txt += '[' + ref + ' \u00b7 ' + (CAT_LABELS[s.cat]||s.cat) + '] ' + s.text;
      if (s.userComment) txt += '\n  \u2192 Note: ' + s.userComment;
      txt += '\n\n';
    });
  }
  if (noted.length) {
    txt += '## Additional Notes\n\n';
    noted.forEach(function(s) { txt += 'Line ' + s.lines[0] + ': ' + s.userComment + '\n\n'; });
  }
  if (rejected.length) {
    txt += '## Skipped (' + rejected.length + ')\n';
    rejected.forEach(function(s) { txt += '- Line ' + s.lines[0] + ': ' + s.text.slice(0,55) + '\u2026\n'; });
  }
  out.textContent = txt.trim();
}

// ── Full update ──────────────────────────────────────────────────
function updateAll() { updateCounts(); renderSugs(); renderDoc(); updatePrompt(); }

// ── Tabs ─────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(function(t) {
  t.addEventListener('click', function() {
    appState.filter = t.dataset.filter;
    document.querySelectorAll('.tab').forEach(function(x){ x.classList.remove('active'); });
    t.classList.add('active');
    renderSugs();
  });
});

// ── Copy ─────────────────────────────────────────────────────────
document.getElementById('copy-btn').addEventListener('click', function() {
  var txt = document.getElementById('prompt-out').textContent;
  if (!txt || txt.indexOf('Approve') === 0) return;
  navigator.clipboard.writeText(txt).then(function() {
    var btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(function(){ btn.textContent = 'Copy Prompt'; btn.classList.remove('copied'); }, 1800);
  });
});

// ── Init ─────────────────────────────────────────────────────────
updateAll();
</script>
</body>
</html>
