<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEFS Architecture Map</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f8fafc; color: #0f172a; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  #header { background: #ffffff; border-bottom: 1px solid #e2e8f0; padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  #header h1 { font-size: 15px; font-weight: 600; color: #0f172a; }
  #header .badge { font-size: 11px; background: #1f6feb33; color: #2563eb; border: 1px solid #1f6feb66; border-radius: 12px; padding: 2px 8px; }
  #header .spacer { flex: 1; }

  #main { display: flex; flex: 1; overflow: hidden; }

  #sidebar { width: 230px; background: #ffffff; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
  .sidebar-section { padding: 12px; border-bottom: 1px solid #f1f5f9; }
  .sidebar-section h3 { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }

  .preset-btn { display: block; width: 100%; text-align: left; background: #f1f5f9; border: 1px solid #e2e8f0; color: #374151; font-size: 12px; padding: 6px 10px; border-radius: 5px; cursor: pointer; margin-bottom: 4px; transition: all 0.15s; }
  .preset-btn:hover { background: #e2e8f0; color: #0f172a; }
  .preset-btn.active { background: #1f6feb22; border-color: #1f6feb; color: #2563eb; }

  .layer-toggle { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; cursor: pointer; }
  .layer-toggle input { display: none; }
  .layer-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .layer-toggle label { font-size: 12px; color: #374151; cursor: pointer; }
  .layer-toggle.unchecked label { color: #94a3b8; }

  .flow-btn { display: flex; align-items: center; gap: 8px; width: 100%; background: none; border: none; color: #374151; font-size: 12px; padding: 5px 0; cursor: pointer; text-align: left; }
  .flow-btn:hover { color: #0f172a; }
  .flow-btn.active { font-weight: 600; color: #0f172a; }

  .comment-item { background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 6px; padding: 8px; margin-bottom: 6px; font-size: 11px; position: relative; }
  .comment-target { font-weight: 600; color: #2563eb; margin-bottom: 3px; }
  .comment-text { color: #374151; line-height: 1.4; }
  .comment-delete { position: absolute; top: 6px; right: 8px; background: none; border: none; color: #64748b; cursor: pointer; font-size: 13px; line-height: 1; }
  .comment-delete:hover { color: #f85149; }
  .no-comments { font-size: 11px; color: #64748b; font-style: italic; }

  #canvas-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
  #svg-container { flex: 1; overflow: hidden; position: relative; background: #f8fafc; cursor: grab; }
  #svg-container:active { cursor: grabbing; }
  #arch-svg { position: absolute; top: 0; left: 0; }

  #zoom-controls { position: absolute; bottom: 12px; right: 12px; display: flex; gap: 4px; z-index: 10; }
  .zoom-btn { background: #f1f5f9; border: 1px solid #e2e8f0; color: #374151; width: 28px; height: 28px; border-radius: 5px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
  .zoom-btn:hover { background: #e2e8f0; color: #0f172a; }

  #legend { position: absolute; bottom: 12px; left: 12px; background: #ffffff99; border: 1px solid #e2e8f0; border-radius: 6px; padding: 8px 12px; font-size: 11px; color: #64748b; }
  #legend div { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  #legend .dot { width: 8px; height: 8px; border-radius: 2px; }

  #prompt-area { background: #ffffff; border-top: 1px solid #e2e8f0; padding: 10px 16px; flex-shrink: 0; }
  #prompt-area .prompt-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  #prompt-area h3 { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.8px; }
  #copy-btn { background: #f1f5f9; border: 1px solid #e2e8f0; color: #374151; font-size: 11px; padding: 3px 10px; border-radius: 5px; cursor: pointer; }
  #copy-btn:hover { background: #e2e8f0; }
  #copy-btn.copied { color: #16a34a; border-color: #16a34a66; }
  #prompt-output { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; color: #374151; line-height: 1.5; max-height: 80px; overflow-y: auto; white-space: pre-wrap; }

  #modal-overlay { display: none; position: fixed; inset: 0; background: #f8fafc88; z-index: 100; align-items: center; justify-content: center; }
  #modal-overlay.open { display: flex; }
  #modal { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 10px; width: 420px; padding: 20px; }
  #modal h2 { font-size: 15px; font-weight: 600; color: #0f172a; margin-bottom: 4px; }
  #modal .modal-subtitle { font-size: 11px; color: #64748b; font-family: monospace; margin-bottom: 14px; }
  #modal .modal-info { font-size: 12px; color: #374151; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 6px; padding: 10px; margin-bottom: 12px; line-height: 1.5; }
  #modal textarea { width: 100%; background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 6px; color: #0f172a; font-size: 12px; padding: 8px; resize: vertical; min-height: 70px; outline: none; }
  #modal textarea:focus { border-color: #1f6feb; }
  #modal .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px; }
  .btn-primary { background: #1f6feb; border: none; color: #fff; font-size: 12px; padding: 6px 14px; border-radius: 6px; cursor: pointer; }
  .btn-primary:hover { background: #388bfd; }
  .btn-cancel { background: #f1f5f9; border: 1px solid #e2e8f0; color: #374151; font-size: 12px; padding: 6px 14px; border-radius: 6px; cursor: pointer; }
  .btn-cancel:hover { background: #e2e8f0; }

  #tooltip { display: none; position: fixed; background: #1c2128; border: 1px solid #30363d; border-radius: 6px; padding: 8px 12px; font-size: 11px; color: #e2e8f0; pointer-events: none; z-index: 50; max-width: 260px; box-shadow: 0 4px 16px #00000066; }
  #tooltip .tt-title { font-weight: 600; margin-bottom: 3px; color: #ffffff; }
  #tooltip .tt-file { font-family: monospace; color: #94a3b8; font-size: 10px; margin-bottom: 4px; }
  #tooltip .tt-desc { color: #cbd5e1; line-height: 1.4; }
</style>
</head>
<body>

<div id="header">
  <h1>BEFS Architecture Map</h1>
  <span class="badge">Bufetat Eiendomsforvaltningssystem</span>
  <div class="spacer"></div>
  <span style="font-size:11px;color:#64748b;">Click nodes to comment · Drag to pan · Scroll to zoom</span>
</div>

<div id="main">
  <div id="sidebar">
    <div class="sidebar-section">
      <h3>Views</h3>
      <button class="preset-btn active" data-preset="full">Full System</button>
      <button class="preset-btn" data-preset="frontend">Frontend Only</button>
      <button class="preset-btn" data-preset="backend">Backend Only</button>
      <button class="preset-btn" data-preset="auth">Auth Flow</button>
      <button class="preset-btn" data-preset="data">Data Flow</button>
    </div>

    <div class="sidebar-section">
      <h3>Layers</h3>
      <div class="layer-toggle" id="lt-browser">
        <div class="layer-dot" style="background:#388bfd"></div>
        <input type="checkbox" id="l-browser" checked>
        <label for="l-browser">Browser / Client</label>
      </div>
      <div class="layer-toggle" id="lt-frontend">
        <div class="layer-dot" style="background:#3fb950"></div>
        <input type="checkbox" id="l-frontend" checked>
        <label for="l-frontend">Frontend (Vercel)</label>
      </div>
      <div class="layer-toggle" id="lt-backend">
        <div class="layer-dot" style="background:#d29922"></div>
        <input type="checkbox" id="l-backend" checked>
        <label for="l-backend">Backend (Railway)</label>
      </div>
      <div class="layer-toggle" id="lt-db">
        <div class="layer-dot" style="background:#bc8cff"></div>
        <input type="checkbox" id="l-db" checked>
        <label for="l-db">Database (PostgreSQL)</label>
      </div>
      <div class="layer-toggle" id="lt-auth">
        <div class="layer-dot" style="background:#f78166"></div>
        <input type="checkbox" id="l-auth" checked>
        <label for="l-auth">Auth (Supabase)</label>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>Highlight Flow</h3>
      <button class="flow-btn active" data-flow="all">
        <div style="width:22px;height:2px;border-radius:1px;background:#e2e8f0;flex-shrink:0"></div>
        Show All
      </button>
      <button class="flow-btn" data-flow="dashboard">
        <div style="width:22px;height:3px;border-radius:2px;background:#2563eb;flex-shrink:0"></div>
        Dashboard Load
      </button>
      <button class="flow-btn" data-flow="contracts">
        <div style="width:22px;height:3px;border-radius:2px;background:#3fb950;flex-shrink:0"></div>
        Contract Fetch
      </button>
      <button class="flow-btn" data-flow="auth">
        <div style="width:22px;height:3px;border-radius:2px;background:#f78166;flex-shrink:0"></div>
        Auth Flow
      </button>
      <button class="flow-btn" data-flow="properties">
        <div style="width:22px;height:3px;border-radius:2px;background:#d29922;flex-shrink:0"></div>
        Property Access
      </button>
    </div>

    <div class="sidebar-section" style="flex:1">
      <h3>Comments (<span id="comment-count">0</span>)</h3>
      <div id="comments-list"><p class="no-comments">Click a node to add feedback</p></div>
    </div>
  </div>

  <div id="canvas-area">
    <div id="svg-container">
      <svg id="arch-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div id="zoom-controls">
      <button class="zoom-btn" id="btn-zoom-in" title="Zoom in">+</button>
      <button class="zoom-btn" id="btn-zoom-out" title="Zoom out">−</button>
      <button class="zoom-btn" id="btn-zoom-reset" title="Reset view" style="font-size:11px">⌂</button>
    </div>
    <div id="legend">
      <div><div class="dot" style="background:#388bfd"></div>Browser</div>
      <div><div class="dot" style="background:#3fb950"></div>Frontend (Vercel)</div>
      <div><div class="dot" style="background:#d29922"></div>Backend (Railway)</div>
      <div><div class="dot" style="background:#bc8cff"></div>Database</div>
      <div><div class="dot" style="background:#f78166"></div>Auth (Supabase)</div>
    </div>
  </div>
</div>

<div id="prompt-area">
  <div class="prompt-header">
    <h3>Prompt Output</h3>
    <button id="copy-btn">Copy Prompt</button>
  </div>
  <div id="prompt-output"></div>
</div>

<div id="modal-overlay">
  <div id="modal">
    <h2 id="modal-title"></h2>
    <div class="modal-subtitle" id="modal-subtitle"></div>
    <div class="modal-info" id="modal-info"></div>
    <textarea id="modal-textarea" placeholder="Add feedback or note about this component..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-primary" id="modal-save">Save Comment</button>
    </div>
  </div>
</div>

<div id="tooltip">
  <div class="tt-title" id="tt-title"></div>
  <div class="tt-file" id="tt-file"></div>
  <div class="tt-desc" id="tt-desc"></div>
</div>

<script>
// ─── Escape HTML to prevent XSS ────────────────────────────────
function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function getCenter(n) { return { x: n.x + n.w / 2, y: n.y + n.h / 2 }; }

function edgePt(node, toward) {
  const cx = node.x + node.w / 2, cy = node.y + node.h / 2;
  const dx = toward.x - cx, dy = toward.y - cy;
  const hw = node.w / 2, hh = node.h / 2;
  if (dx === 0 && dy === 0) return { x: cx, y: cy };
  if (Math.abs(dx) * hh > Math.abs(dy) * hw) {
    const t = hw / Math.abs(dx);
    return { x: cx + Math.sign(dx) * hw, y: cy + dy * t };
  }
  const t = hh / Math.abs(dy);
  return { x: cx + dx * t, y: cy + Math.sign(dy) * hh };
}

function render() {
  // Remove all children after the static ones (defs=index0, bg=1, bands=2-11)
  const staticCount = 1 + 1 + (5 * 2); // defs + bg + 5 bands × (rect+text)
  while (svg.children.length > staticCount) svg.removeChild(svg.lastChild);

  const visible = nodes.filter(n => state.layers[n.layer]);
  const visIds = new Set(visible.map(n => n.id));

  // Draw connections
  connections.forEach(conn => {
    if (!visIds.has(conn.from) || !visIds.has(conn.to)) return;
    const fn = nodes.find(n => n.id === conn.from);
    const tn = nodes.find(n => n.id === conn.to);
    if (!fn || !tn) return;

    const tc = getCenter(tn), fc = getCenter(fn);
    const start = edgePt(fn, tc), end = edgePt(tn, fc);
    const style = connStyles[conn.type] || connStyles.data;
    const highlighted = state.activeFlow === 'all' || (conn.flows && conn.flows.includes(state.activeFlow));
    const op = state.activeFlow === 'all' ? 0.5 : (highlighted ? 1 : 0.06);
    const w = (highlighted && state.activeFlow !== 'all') ? style.width + 1 : style.width;

    const mx = (start.x + end.x) / 2, my = (start.y + end.y) / 2;
    const curve = Math.min(Math.abs(end.y - start.y), 50) * 0.4;
    const horiz = Math.abs(end.x - start.x) > Math.abs(end.y - start.y);
    const cx1 = horiz ? mx - curve : start.x;
    const cy1 = horiz ? start.y : my - curve;
    const cx2 = horiz ? mx + curve : end.x;
    const cy2 = horiz ? end.y : my + curve;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M${start.x},${start.y} C${cx1},${cy1} ${cx2},${cy2} ${end.x},${end.y}`);
    path.setAttribute('stroke', style.color);
    path.setAttribute('stroke-width', w);
    if (style.dash) path.setAttribute('stroke-dasharray', style.dash);
    path.setAttribute('fill', 'none');
    path.setAttribute('opacity', op);
    path.setAttribute('marker-end', `url(#arr-${conn.type})`);
    svg.appendChild(path);

    if (conn.label && highlighted && state.activeFlow !== 'all') {
      const lx = (start.x + end.x) / 2, ly = (start.y + end.y) / 2;
      const lbg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      const lw = conn.label.length * 5.2 + 8;
      lbg.setAttribute('x', lx - lw / 2); lbg.setAttribute('y', ly - 8);
      lbg.setAttribute('width', lw); lbg.setAttribute('height', 14);
      lbg.setAttribute('rx', '3'); lbg.setAttribute('fill', '#ffffff');
      svg.appendChild(lbg);
      const lt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      lt.setAttribute('x', lx); lt.setAttribute('y', ly + 2);
      lt.setAttribute('text-anchor', 'middle');
      lt.setAttribute('font-size', '9'); lt.setAttribute('fill', style.color);
      lt.setAttribute('font-family', 'monospace');
      lt.textContent = conn.label;
      svg.appendChild(lt);
    }
  });

  // Draw nodes
  visible.forEach(node => {
    const commented = state.comments.some(c => c.target === node.id);
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.style.cursor = 'pointer';

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', node.x); rect.setAttribute('y', node.y);
    rect.setAttribute('width', node.w); rect.setAttribute('height', node.h);
    rect.setAttribute('rx', '14'); rect.setAttribute('fill', node.color);
    rect.setAttribute('stroke', commented ? '#f0e040' : node.stroke);
    rect.setAttribute('stroke-width', commented ? '2.5' : '1.5');
    g.appendChild(rect);

    const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    lbl.setAttribute('x', node.x + node.w / 2); lbl.setAttribute('y', node.y + 17);
    lbl.setAttribute('text-anchor', 'middle'); lbl.setAttribute('font-size', '12');
    lbl.setAttribute('font-weight', '600'); lbl.setAttribute('fill', '#f1f5f9');
    lbl.setAttribute('font-family', '-apple-system, BlinkMacSystemFont, sans-serif');
    lbl.textContent = node.label;
    g.appendChild(lbl);

    const sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    const subStr = node.subtitle.length > 30 ? node.subtitle.slice(0, 29) + '…' : node.subtitle;
    sub.setAttribute('x', node.x + node.w / 2); sub.setAttribute('y', node.y + 31);
    sub.setAttribute('text-anchor', 'middle'); sub.setAttribute('font-size', '9');
    sub.setAttribute('fill', '#94a3b8'); sub.setAttribute('font-family', 'monospace');
    sub.textContent = subStr;
    g.appendChild(sub);

    if (commented) {
      const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      dot.setAttribute('cx', node.x + node.w - 6); dot.setAttribute('cy', node.y + 6);
      dot.setAttribute('r', '4'); dot.setAttribute('fill', '#f0e040');
      g.appendChild(dot);
    }

    g.addEventListener('mouseenter', e => showTooltip(node, e));
    g.addEventListener('mousemove', e => moveTooltip(e));
    g.addEventListener('mouseleave', hideTooltip);
    g.addEventListener('click', () => openModal(node));
    svg.appendChild(g);
  });

  updatePrompt();
}

// ─── Transform ──────────────────────────────────────────────────
function applyTransform() {
  svg.style.transform = `translate(${state.panX}px, ${state.panY}px) scale(${state.scale})`;
  svg.style.transformOrigin = '0 0';
}
function zoom(f) {
  state.scale = Math.max(0.3, Math.min(2.5, state.scale * f));
  applyTransform();
}
function resetView() { state.scale = 1; state.panX = 20; state.panY = 10; applyTransform(); }

let panning = false, lastX = 0, lastY = 0;
container.addEventListener('mousedown', e => { if (e.button === 0) { panning = true; lastX = e.clientX; lastY = e.clientY; } });
window.addEventListener('mousemove', e => {
  if (!panning) return;
  state.panX += e.clientX - lastX; state.panY += e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  applyTransform();
});
window.addEventListener('mouseup', () => { panning = false; });
container.addEventListener('wheel', e => { e.preventDefault(); zoom(e.deltaY < 0 ? 1.1 : 0.9); }, { passive: false });

// ─── Tooltip ────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
function showTooltip(node, e) {
  document.getElementById('tt-title').textContent = node.label;
  document.getElementById('tt-file').textContent = node.subtitle;
  document.getElementById('tt-desc').textContent = node.info;
  tooltip.style.display = 'block';
  moveTooltip(e);
}
function moveTooltip(e) {
  let x = e.clientX + 14, y = e.clientY + 14;
  if (x + 270 > window.innerWidth) x = e.clientX - 278;
  if (y + 130 > window.innerHeight) y = e.clientY - 130;
  tooltip.style.left = x + 'px'; tooltip.style.top = y + 'px';
}
function hideTooltip() { tooltip.style.display = 'none'; }

// ─── Modal ──────────────────────────────────────────────────────
let modalNode = null;
function openModal(node) {
  modalNode = node;
  document.getElementById('modal-title').textContent = node.label;
  document.getElementById('modal-subtitle').textContent = node.subtitle;
  document.getElementById('modal-info').textContent = node.info;
  const existing = state.comments.find(c => c.target === node.id);
  document.getElementById('modal-textarea').value = existing ? existing.text : '';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('modal-textarea').focus(), 80);
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  modalNode = null;
}
function saveComment() {
  const text = document.getElementById('modal-textarea').value.trim();
  if (!text || !modalNode) { closeModal(); return; }
  state.comments = state.comments.filter(c => c.target !== modalNode.id);
  state.comments.push({ id: Date.now(), target: modalNode.id, targetLabel: modalNode.label, targetFile: modalNode.subtitle, text });
  closeModal();
  render();
  renderComments();
}
document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-save').addEventListener('click', saveComment);
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === document.getElementById('modal-overlay')) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ─── Comments sidebar (DOM-based, no innerHTML with user data) ─
function renderComments() {
  const list = document.getElementById('comments-list');
  document.getElementById('comment-count').textContent = state.comments.length;

  // Clear safely
  while (list.firstChild) list.removeChild(list.firstChild);

  if (state.comments.length === 0) {
    const p = document.createElement('p');
    p.className = 'no-comments';
    p.textContent = 'Click a node to add feedback';
    list.appendChild(p);
    return;
  }

  state.comments.forEach(c => {
    const item = document.createElement('div');
    item.className = 'comment-item';

    const del = document.createElement('button');
    del.className = 'comment-delete';
    del.textContent = '×';
    del.title = 'Remove comment';
    del.addEventListener('click', () => deleteComment(c.id));

    const target = document.createElement('div');
    target.className = 'comment-target';
    target.textContent = c.targetLabel;

    const text = document.createElement('div');
    text.className = 'comment-text';
    text.textContent = c.text;

    item.appendChild(del);
    item.appendChild(target);
    item.appendChild(text);
    list.appendChild(item);
  });

  updatePrompt();
}

function deleteComment(id) {
  state.comments = state.comments.filter(c => c.id !== id);
  render();
  renderComments();
}

// ─── Prompt output ───────────────────────────────────────────────
function updatePrompt() {
  const layerNames = { browser: 'Browser', frontend: 'Frontend (Vercel)', backend: 'Backend (Railway)', db: 'Database', auth: 'Auth (Supabase)' };
  const flowNames = { all: 'Full System', dashboard: 'Dashboard Load', contracts: 'Contract Fetch', auth: 'Auth Flow', properties: 'Property Access' };
  const visible = Object.entries(state.layers).filter(([, v]) => v).map(([k]) => k);

  let text = 'This is the BEFS (Bufetat Eiendomsforvaltningssystem) architecture';
  if (state.activeFlow !== 'all') text += `, focusing on the ${flowNames[state.activeFlow]}`;
  text += '.\n';
  if (visible.length < 5) text += `Visible layers: ${visible.map(l => layerNames[l]).join(', ')}.\n`;

  if (state.comments.length > 0) {
    text += '\nFeedback on specific components:\n';
    state.comments.forEach(c => { text += `\n**${c.targetLabel}** (${c.targetFile}):\n${c.text}\n`; });
  }

  document.getElementById('prompt-output').textContent = text.trim();
}

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const name = btn.dataset.preset;
    const p = presets[name];
    if (!p) return;
    Object.assign(state.layers, p.layers);
    Object.entries(p.layers).forEach(([layer, val]) => {
      const cb = document.getElementById(`l-${layer}`);
      if (cb) cb.checked = val;
      const lt = document.getElementById(`lt-${layer}`);
      if (lt) lt.classList.toggle('unchecked', !val);
    });
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    setFlow(p.flow);
    render();
  });
});

document.querySelectorAll('.layer-toggle input[type=checkbox]').forEach(cb => {
  cb.addEventListener('change', () => {
    const layer = cb.id.replace('l-', '');
    state.layers[layer] = cb.checked;
    const lt = document.getElementById(`lt-${layer}`);
    if (lt) lt.classList.toggle('unchecked', !cb.checked);
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    render();
  });
});

document.querySelectorAll('.flow-btn').forEach(btn => {
  btn.addEventListener('click', () => setFlow(btn.dataset.flow));
});

function setFlow(flow) {
  state.activeFlow = flow;
  document.querySelectorAll('.flow-btn').forEach(b => b.classList.remove('active'));
  const target = document.querySelector(`.flow-btn[data-flow="${flow}"]`);
  if (target) target.classList.add('active');
  render();
}

document.getElementById('btn-zoom-in').addEventListener('click', () => zoom(1.2));
document.getElementById('btn-zoom-out').addEventListener('click', () => zoom(0.83));
document.getElementById('btn-zoom-reset').addEventListener('click', resetView);

document.getElementById('copy-btn').addEventListener('click', () => {
  const text = document.getElementById('prompt-output').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy Prompt'; btn.classList.remove('copied'); }, 1800);
  });
});

// ─── Init ────────────────────────────────────────────────────────
initSVG();
render();
renderComments();
applyTransform();
</script>
</body>
</html>
