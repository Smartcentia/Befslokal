<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEFS Database Explorer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8fafc;--surface:#ffffff;--surface2:#f1f5f9;--border:#e2e8f0;
  --text:#0f172a;--muted:#64748b;--accent:#2563eb;--green:#3fb950;
  --yellow:#d29922;--red:#f85149;--purple:#bc8cff;--orange:#f0883e;
  --font:'Helvetica Neue',Helvetica,Arial,sans-serif;
  --mono:'SF Mono','Fira Code',Consolas,monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#header{background:var(--surface);border-bottom:1px solid var(--border);padding:9px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
#header h1{font-size:13px;font-weight:600;white-space:nowrap}
.preset-chip{background:var(--surface2);border:1px solid var(--border);border-radius:45px;padding:3px 10px;font-size:11px;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s}
.preset-chip:hover{border-color:var(--accent);color:var(--accent)}
#main{display:flex;flex:1;overflow:hidden}
#left{width:272px;min-width:272px;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--surface)}
#left-scroll{flex:1;overflow-y:auto;padding:10px 12px}
.sec-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:12px 0 5px}
.sec-label:first-child{margin-top:0}
.domain-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.domain-chip{padding:2px 8px;border-radius:12px;font-size:10px;font-weight:500;cursor:pointer;border:1px solid transparent;opacity:.55;transition:opacity .15s}
.domain-chip.active{opacity:1}
#search{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:5px 9px;color:var(--text);font-size:12px;margin-bottom:7px;outline:none}
#search:focus{border-color:var(--accent)}
#table-list{max-height:195px;overflow-y:auto;border:1px solid var(--border);border-radius:14px;background:var(--bg)}
.table-item{padding:5px 9px;cursor:pointer;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--border);transition:background .1s}
.table-item:last-child{border-bottom:none}
.table-item:hover{background:var(--surface2)}
.table-item.selected{background:rgba(88,166,255,.1)}
.table-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.table-name{font-family:var(--mono);font-size:11px;flex:1}
.table-cols-count{font-size:10px;color:var(--muted)}
#col-list{max-height:130px;overflow-y:auto;border:1px solid var(--border);border-radius:14px;background:var(--bg);padding:3px}
.col-check-item{display:flex;align-items:center;gap:6px;padding:3px 5px;border-radius:3px;cursor:pointer}
.col-check-item:hover{background:var(--surface2)}
.col-check-item input[type=checkbox]{cursor:pointer;flex-shrink:0}
.col-label{font-family:var(--mono);font-size:11px;flex:1}
.col-type{font-size:10px;color:var(--muted)}
#filters{display:flex;flex-direction:column;gap:4px}
.filter-row{display:flex;gap:3px;align-items:center}
.filter-row select,.filter-row input{background:var(--bg);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:11px;padding:3px 5px;outline:none}
.filter-row select{width:95px}.filter-row .op-sel{width:50px}.filter-row input{flex:1;min-width:0}
.filter-row select:focus,.filter-row input:focus{border-color:var(--accent)}
.btn-sm{background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--muted);font-size:11px;padding:3px 8px;cursor:pointer;white-space:nowrap}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.btn-rm{background:none;border:none;color:var(--muted);cursor:pointer;padding:1px 4px;font-size:13px;line-height:1}
.btn-rm:hover{color:var(--red)}
.ctrl-row{display:flex;align-items:center;gap:5px}
.ctrl-row label{font-size:11px;color:var(--muted);white-space:nowrap}
.ctrl-row select{background:var(--bg);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:11px;padding:3px 5px;outline:none;flex:1}
.ctrl-row select:focus{border-color:var(--accent)}
#dir-toggle{background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:10px;padding:3px 6px;cursor:pointer;font-family:var(--mono)}
#dir-toggle:hover{border-color:var(--accent)}
#right{flex:1;display:flex;flex-direction:column;overflow:hidden}
#tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.tab-btn{padding:8px 14px;border:none;background:none;color:var(--muted);font-size:12px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
#tab-content{flex:1;overflow-y:auto;padding:16px}
.schema-table{width:100%;border-collapse:collapse;font-size:12px}
.schema-table th{text-align:left;padding:5px 10px;border-bottom:1px solid var(--border);color:var(--muted);font-weight:500;font-size:10px;text-transform:uppercase;letter-spacing:.3px;position:sticky;top:0;background:var(--bg)}
.schema-table td{padding:4px 10px;border-bottom:1px solid rgba(48,54,61,.5);font-family:var(--mono);font-size:11px}
.schema-table tr:hover td{background:var(--surface2)}
.badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-right:2px}
.badge-pk{background:rgba(188,140,255,.2);color:var(--purple)}
.badge-fk{background:rgba(88,166,255,.2);color:var(--accent)}
.badge-nn{background:rgba(63,185,80,.2);color:var(--green)}
.badge-idx{background:rgba(210,153,34,.2);color:var(--yellow)}
.rel-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:9px 13px;margin-bottom:7px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:border-color .15s}
.rel-card:hover{border-color:var(--accent)}
.rel-arrow{color:var(--muted);font-size:15px}
.rel-tbl{font-family:var(--mono);font-size:12px}
.rel-via{font-size:10px;color:var(--muted);flex:1}
.rel-type{font-size:10px;padding:2px 6px;border-radius:10px}
.rt-one{background:rgba(88,166,255,.15);color:var(--accent)}
.rt-many{background:rgba(63,185,80,.15);color:var(--green)}
.rt-mm{background:rgba(188,140,255,.15);color:var(--purple)}
.mig-item{display:flex;gap:11px;padding-bottom:14px;position:relative}
.mig-item::before{content:'';position:absolute;left:6px;top:14px;bottom:0;width:1px;background:var(--border)}
.mig-item:last-child::before{display:none}
.mig-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;margin-top:2px;border:2px solid var(--bg)}
.mig-dot.core{background:var(--accent)}
.mig-dot.schema{background:var(--green)}
.mig-dot.fix{background:var(--yellow)}
.mig-dot.auth{background:var(--orange)}
.mig-body{flex:1}
.mig-id{font-family:var(--mono);font-size:10px;color:var(--muted)}
.mig-desc{font-size:12px;margin-top:2px}
#sql-output{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:14px;font-family:var(--mono);font-size:12px;line-height:1.75;white-space:pre;overflow-x:auto}
.kw{color:#ff7b72}.tbl{color:#79c0ff}.str{color:#a5d6ff}.num{color:#79c0ff}
#footer{border-top:1px solid var(--border);background:var(--surface);padding:9px 14px;flex-shrink:0;display:flex;gap:9px;align-items:flex-end}
#prompt-wrap{flex:1}
#prompt-label{font-size:10px;font-weight:600;text-transform:uppercase;color:var(--muted);margin-bottom:4px;letter-spacing:.5px}
#prompt-output{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:7px 11px;font-size:12px;color:var(--text);font-family:var(--mono);min-height:48px;max-height:72px;overflow-y:auto;resize:none}
#copy-btn{background:var(--accent);border:none;border-radius:14px;color:#fff;font-size:12px;font-weight:500;padding:7px 14px;cursor:pointer;white-space:nowrap}
#copy-btn:hover{opacity:.85}
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty-icon{font-size:40px;opacity:.18;margin-bottom:10px}
.empty p{font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div id="header">
  <h1>&#x2BD1; BEFS Database Explorer</h1>
  <div id="presets" style="display:flex;gap:6px;flex-wrap:wrap"></div>
</div>

<div id="main">
  <aside id="left">
    <div id="left-scroll">
      <div class="sec-label">Domain</div>
      <div class="domain-chips" id="domain-chips"></div>
      <div class="sec-label">Tables</div>
      <input type="text" id="search" placeholder="Search tables...">
      <div id="table-list"></div>

      <div id="query-controls" style="display:none">
        <div class="sec-label">Columns</div>
        <div id="col-list"></div>
        <div class="sec-label">Filters</div>
        <div id="filters"></div>
        <button class="btn-sm" id="add-filter" style="width:100%;margin-top:5px;text-align:center">+ Add Filter</button>
        <div class="sec-label">Order By</div>
        <div class="ctrl-row">
          <select id="order-col"></select>
          <button id="dir-toggle">ASC</button>
        </div>
        <div class="sec-label">Limit</div>
        <div class="ctrl-row">
          <label id="limit-label">100 rows</label>
          <input type="range" id="limit-slider" min="0" max="4" value="3" style="flex:1;cursor:pointer">
        </div>
      </div>
    </div>
  </aside>

  <section id="right">
    <div id="tabs">
      <button class="tab-btn active" data-tab="schema">Schema</button>
      <button class="tab-btn" data-tab="relations">Relations</button>
      <button class="tab-btn" data-tab="migrations">Migrations</button>
      <button class="tab-btn" data-tab="sql">SQL Preview</button>
    </div>
    <div id="tab-content"></div>
  </section>
</div>

<div id="footer">
  <div id="prompt-wrap">
    <div id="prompt-label">Prompt Output</div>
    <textarea id="prompt-output" readonly placeholder="Select a table to generate a query prompt..."></textarea>
  </div>
  <button id="copy-btn">Copy</button>
</div>

<script>
// ── DOMAIN COLORS ──────────────────────────────────────────
var DC = {
  'Core':      { bg:'rgba(88,166,255,.15)',  color:'#58a6ff' },
  'HMS':       { bg:'rgba(63,185,80,.15)',   color:'#3fb950' },
  'FDV':       { bg:'rgba(210,153,34,.15)',  color:'#d29922' },

  'Analytics': { bg:'rgba(121,192,255,.15)', color:'#79c0ff' },

var LIMIT_VALS = [10, 25, 50, 100, 500];

// ── SCHEMA ─────────────────────────────────────────────────
var SCHEMA = {
  properties: {
    domain:'Core', desc:'Real estate properties managed in BEFS',
    columns:[
      {name:'id',type:'Integer',pk:true},
      {name:'name',type:'String',nn:true},
      {name:'address',type:'String'},
      {name:'city',type:'String'},
      {name:'postal_code',type:'String'},
      {name:'property_type',type:'String'},
      {name:'region',type:'String'},

function mk(tag, cls, txt, style) {
  var e = document.createElement(tag);
  if (cls)   e.className = cls;
  if (txt != null) e.textContent = txt;
  if (style) e.style.cssText = style;
  return e;
}
function clear(el) { while (el.firstChild) el.removeChild(el.firstChild); }

// ── DOMAIN CHIPS ───────────────────────────────────────────
function renderDomains() {
  var wrap = document.getElementById('domain-chips');
  clear(wrap);
  var domains = ['All'].concat(Object.keys(DC));
  domains.forEach(function(d) {
    var chip = mk('span', 'domain-chip' + (S.domain === d ? ' active' : ''), d);
    var dc = DC[d];
    if (dc) {
      chip.style.background = dc.bg;
      chip.style.color = dc.color;
      chip.style.borderColor = dc.color.replace('rgb(','rgba(').replace(')',',0.45)');
    } else {
      chip.style.background = S.domain === 'All' ? 'rgba(139,148,158,.3)' : 'rgba(139,148,158,.12)';
      chip.style.color = '#8b949e';
      chip.style.borderColor = 'rgba(139,148,158,.4)';
    }
    chip.addEventListener('click', function() {
      S.domain = d; S.table = null; S.cols = []; S.filters = [];
      renderAll();
    });
    wrap.appendChild(chip);
  });
}

// ── TABLE LIST ─────────────────────────────────────────────
function filteredTables() {
  var q = document.getElementById('search').value.toLowerCase();
  return Object.keys(SCHEMA).filter(function(name) {
    var info = SCHEMA[name];
    if (S.domain !== 'All' && info.domain !== S.domain) return false;
    if (q && name.toLowerCase().indexOf(q) === -1) return false;
    return true;
  });
}

function renderTableList() {
  var wrap = document.getElementById('table-list');
  clear(wrap);
  var tables = filteredTables();
  if (!tables.length) {
    wrap.appendChild(mk('div', null, 'No tables match', 'padding:12px;text-align:center;color:#8b949e;font-size:11px'));
    return;
  }
  tables.forEach(function(name) {
    var info = SCHEMA[name];
    var dc = DC[info.domain] || {color:'#8b949e'};
    var row = mk('div', 'table-item' + (S.table === name ? ' selected' : ''));
    var dot = mk('div', 'table-dot');
    dot.style.background = dc.color;
    row.appendChild(dot);
    row.appendChild(mk('span', 'table-name', name));
    row.appendChild(mk('span', 'table-cols-count', info.columns.length + 'c'));
    row.addEventListener('click', function() { pickTable(name); });
    wrap.appendChild(row);
  });
}

function pickTable(name) {
  S.table = name; S.cols = []; S.filters = []; S.order = '';
  renderAll();
}

function renderColList() {
  var wrap = document.getElementById('col-list');
  clear(wrap);
  var info = SCHEMA[S.table];
  if (!info) return;
  info.columns.forEach(function(col) {
    var label = mk('label', 'col-check-item');
    var cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = S.cols.indexOf(col.name) !== -1;
    cb.addEventListener('change', function() {
      if (cb.checked) { if (S.cols.indexOf(col.name) === -1) S.cols.push(col.name); }
      else { var i = S.cols.indexOf(col.name); if (i !== -1) S.cols.splice(i,1); }
      renderAll();
    });
    label.appendChild(cb);
    label.appendChild(mk('span', 'col-label', col.name));
    label.appendChild(mk('span', 'col-type', col.type));
    wrap.appendChild(label);
  });
}

function renderFilters() {
  var wrap = document.getElementById('filters');
  clear(wrap);
  var info = SCHEMA[S.table];
  var colNames = info ? info.columns.map(function(c){return c.name;}) : [];
  S.filters.forEach(function(f, idx) {
    var row = mk('div', 'filter-row');
    // column select
    var cSel = document.createElement('select');
    var nOpt = mk('option', null, 'column'); nOpt.value=''; cSel.appendChild(nOpt);
    colNames.forEach(function(cn) {
      var opt = mk('option', null, cn); opt.value = cn;
      if (f.col === cn) opt.selected = true;
      cSel.appendChild(opt);
    });
    cSel.addEventListener('change', function(){ f.col = cSel.value; renderAll(); });
    // op select
    var oSel = document.createElement('select');
    oSel.className = 'op-sel';
    ['=','!=','>','>=','<','<=','LIKE','IS NULL','IS NOT NULL'].forEach(function(op){
      var opt = mk('option',null,op); opt.value=op;
      if (f.op===op) opt.selected=true;
      oSel.appendChild(opt);
    });
    oSel.addEventListener('change', function(){ f.op = oSel.value; renderAll(); });
    // value input
    var vInp = document.createElement('input');
    vInp.type='text'; vInp.placeholder='value'; vInp.value = f.val||'';
    vInp.addEventListener('input', function(){ f.val = vInp.value; renderAll(); });
    // remove
    var rm = mk('button','btn-rm','×');
    (function(i){ rm.addEventListener('click', function(){ S.filters.splice(i,1); renderAll(); }); })(idx);
    row.appendChild(cSel); row.appendChild(oSel); row.appendChild(vInp); row.appendChild(rm);
    wrap.appendChild(row);
  });
}

// ── SQL TAB ────────────────────────────────────────────────
function buildSQL() {
  if (!S.table) return '-- Select a table to generate SQL';
  var colStr = S.cols.length ? S.cols.join(', ') : '*';
  var lines = ['SELECT '+colStr, 'FROM '+S.table];
  var where = [];
  S.filters.forEach(function(f) {
    if (!f.col) return;
    if (f.op==='IS NULL'||f.op==='IS NOT NULL') { where.push(f.col+' '+f.op); return; }
    if (!f.val && f.val!==0) return;
    var v = (isNaN(parseFloat(f.val))||!isFinite(f.val)||f.op==='LIKE') ? "'"+f.val+"'" : f.val;
    where.push(f.col+' '+f.op+' '+v);
  });
  if (where.length) lines.push('WHERE '+where.join('\n  AND '));
  if (S.order) lines.push('ORDER BY '+S.order+' '+S.dir);
  lines.push('LIMIT '+LIMIT_VALS[S.lim]);
  return lines.join('\n');
}

function renderSQLHighlighted(pre, sql) {
  clear(pre);
  var KWS = ['SELECT','FROM','WHERE','ORDER BY','LIMIT','AND','OR','JOIN','ON','LEFT','INNER','NOT NULL','IS NOT NULL','IS NULL','LIKE','GROUP BY','HAVING','AS'];
  // Split on keywords and string literals
  var parts = sql.split(/(ORDER BY|GROUP BY|IS NOT NULL|NOT NULL|IS NULL|\b(?:SELECT|FROM|WHERE|LIMIT|AND|OR|JOIN|ON|LEFT|INNER|HAVING|LIKE|AS)\b|'[^']*')/);
  parts.forEach(function(tok) {
    if (!tok) return;
    var span = document.createElement('span');
    var up = tok.trim().toUpperCase();
    if (KWS.indexOf(up) !== -1) span.className='kw';
    else if (tok.length>0 && tok[0]==="'") span.className='str';
    else if (tok.trim()!=='' && !isNaN(parseFloat(tok)) && isFinite(tok.trim())) span.className='num';
    span.textContent = tok;
    pre.appendChild(span);
  });
}

function renderSQLTab(wrap) {
  var sql = buildSQL();
  var pre = mk('pre',null,null,'');
  pre.id = 'sql-output';
  renderSQLHighlighted(pre, sql);
  wrap.appendChild(pre);
  var btn = mk('button','btn-sm','Copy SQL','margin-top:10px;padding:6px 14px');
  btn.addEventListener('click', function() {
    navigator.clipboard.writeText(sql).then(function(){ btn.textContent='Copied!'; setTimeout(function(){btn.textContent='Copy SQL';},1500); });
  });
  wrap.appendChild(btn);
}

// ── PROMPT OUTPUT ──────────────────────────────────────────
function renderPrompt() {
  var ta = document.getElementById('prompt-output');
  if (!S.table) { ta.value=''; return; }
  var info = SCHEMA[S.table];
  var colPart = S.cols.length ? 'the columns: '+S.cols.join(', ') : 'all columns';
  var parts = ['Write a SQL query to fetch '+colPart+' from the '+S.table+' table ('+info.domain+' domain)'];
  var fParts = [];
  S.filters.forEach(function(f){
    if (!f.col) return;
    if (f.op==='IS NULL') fParts.push(f.col+' is null');
    else if (f.op==='IS NOT NULL') fParts.push(f.col+' is not null');
    else if (f.val!==undefined&&f.val!=='') fParts.push(f.col+' '+f.op+' '+f.val);
  });
  if (fParts.length) parts.push('filtered where '+fParts.join(' and '));
  if (S.order) parts.push('ordered by '+S.order+' '+S.dir.toLowerCase());
  parts.push('limited to '+LIMIT_VALS[S.lim]+' rows');
  if (info.desc) parts.push('Note: '+info.desc);
  ta.value = parts.join(', ')+'.';
}

// ── RENDER ALL ─────────────────────────────────────────────
function renderAll() {
  renderDomains();
  renderTableList();
  renderQueryControls();
  renderMainPanel();
  renderPrompt();
}

// ── INIT ───────────────────────────────────────────────────
(function init() {
  // Presets
  var presetsEl = document.getElementById('presets');
  PRESETS.forEach(function(p) {
    var chip = mk('button','preset-chip',p.name);
    chip.addEventListener('click', function() {
      S.domain='All'; S.table=p.table;
      S.cols=p.cols.slice();
      S.filters=p.filters.map(function(f){return{col:f.col,op:f.op,val:f.val};});
      S.order=p.order||''; S.dir=p.dir||'ASC'; S.lim=p.lim; S.tab='sql';
      renderAll();
    });
    presetsEl.appendChild(chip);
  });

  // Search
  document.getElementById('search').addEventListener('input', function(){ renderTableList(); });

  // Tabs
  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { S.tab=btn.dataset.tab; renderMainPanel(); });
  });

  // Add filter
  document.getElementById('add-filter').addEventListener('click', function() {
    S.filters.push({col:'',op:'=',val:''});
    renderAll();
  });

  // Order select
  document.getElementById('order-col').addEventListener('change', function() {
    S.order=this.value; renderAll();
  });

  // Dir toggle
  document.getElementById('dir-toggle').addEventListener('click', function() {
    S.dir = S.dir==='ASC' ? 'DESC' : 'ASC';
    this.textContent = S.dir; renderAll();
  });

  // Limit slider
  document.getElementById('limit-slider').addEventListener('input', function() {
    S.lim=parseInt(this.value,10);
    document.getElementById('limit-label').textContent=LIMIT_VALS[S.lim]+' rows';
    renderAll();
  });

  // Copy prompt
  document.getElementById('copy-btn').addEventListener('click', function() {
    var ta = document.getElementById('prompt-output');
    navigator.clipboard.writeText(ta.value).then(function() {
      document.getElementById('copy-btn').textContent='Copied!';
      setTimeout(function(){document.getElementById('copy-btn').textContent='Copy';},1500);
    });
  });

  renderAll();
})();
</script>
</body>
